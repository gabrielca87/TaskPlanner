<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex w-full max-w-5xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
    <a routerLink="/task-items" class="text-lg font-semibold tracking-tight text-slate-900">TaskPlanner</a>

    <nav class="flex flex-wrap gap-2 text-sm font-medium">
      @for (link of links; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-slate-900 text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-2 text-slate-700 hover:bg-slate-100"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</header>
